<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">

  <title>{{ title or "Sistema do Escritório" }}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  {# 🔹 Evita erro 404 de favicon #}
  <link rel="icon" href="data:,">

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    rel="stylesheet"
  >

  <style>
    body {
      background-color: #f5f6f8;
    }

    .container {
      max-width: 1400px;
    }

    .navbar-brand {
      font-weight: 600;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">

    <a class="navbar-brand" href="/dashboard">
      Escritório
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarPrincipal"
      aria-controls="navbarPrincipal"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarPrincipal">

      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <li class="nav-item">
          <a class="nav-link" href="/dashboard">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/clientes">
            <i class="bi bi-people"></i> Clientes
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/processos?status=PROCEDENTE">
            <i class="bi bi-journal-text"></i> Processos
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/pericias">
            <i class="bi bi-calendar-event"></i> Perícias & Diligências
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/financeiro">
            <i class="bi bi-currency-dollar"></i> Financeiro
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/relatorios">
            <i class="bi bi-file-earmark-pdf"></i> Relatórios
          </a>
        </li>

      </ul>

      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link text-danger" href="/financeiro/sair">
            <i class="bi bi-box-arrow-right"></i> Sair
          </a>
        </li>
      </ul>

    </div>
  </div>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
