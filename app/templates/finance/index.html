{% extends "base.html" %}
{% block content %}

<style>
  /* =========================================================
     ✅ FINANCEIRO / HOME — ajustes MODO DIA (escopado)
     - não altera modo noite
     ========================================================= */

  body.kj-day .financeiro-home{
    color: #0b1b33 !important;
  }

  body.kj-day .financeiro-home h3,
  body.kj-day .financeiro-home h5{
    color: #0b1b33 !important;
  }

  body.kj-day .financeiro-home .text-muted{
    color: rgba(11,27,51,.65) !important;
  }

  body.kj-day .financeiro-home .card{
    background: #fff !important;
    border: 1px solid rgba(37,99,235,.16) !important;
    border-radius: 18px !important;
    box-shadow: 0 16px 38px rgba(2,6,23,.06) !important;
  }

  /* Botões "Abrir" padronizados (sem verde no modo dia) */
  body.kj-day .financeiro-home .btn.btn-primary,
  body.kj-day .financeiro-home .btn.btn-success{
    border-radius: 12px !important;
    border: 1px solid rgba(37,99,235,.28) !important;
    background: linear-gradient(180deg, rgba(37,99,235,.96), rgba(29,78,216,.96)) !important;
    color: rgba(255,255,255,.98) !important;
    font-weight: 900 !important;
    box-shadow: 0 14px 28px rgba(2,6,23,.10), 0 1px 0 rgba(255,255,255,.18) inset !important;
    transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
  }
  body.kj-day .financeiro-home .btn.btn-primary:hover,
  body.kj-day .financeiro-home .btn.btn-success:hover{
    transform: translateY(-1px);
    box-shadow: 0 18px 36px rgba(2,6,23,.12), 0 1px 0 rgba(255,255,255,.22) inset !important;
    filter: brightness(.98) saturate(1.05);
  }

  /* Botão Sair: mantém vermelho no dia */
  body.kj-day .financeiro-home .btn.btn-outline-danger{
    border-radius: 12px !important;
    border: 1px solid rgba(220,38,38,.55) !important;
    color: #dc2626 !important;
    font-weight: 900 !important;
    background: transparent !important;
    box-shadow: none !important;
  }
  body.kj-day .financeiro-home .btn.btn-outline-danger:hover{
    background: rgba(220,38,38,.08) !important;
    transform: translateY(-1px);
  }
</style>

<div class="financeiro-home">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 class="m-0">Financeiro</h3>
    <a class="btn btn-outline-danger" href="/financeiro/sair">Sair</a>
  </div>

  <div class="row g-3">
    <div class="col-md-6">
      <div class="card p-3">
        <h5>Contas a Pagar</h5>
        <p class="text-muted mb-3">Despesas por mês, saldo em conta, marcar/desmarcar pago e relatório completo.</p>
        <a class="btn btn-primary" href="/financeiro/pagar">Abrir</a>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card p-3">
        <h5>Contas a Receber</h5>
        <p class="text-muted mb-3">Recebimentos por mês, por conta, relatórios mensais e comparativo anual.</p>
        <a class="btn btn-success" href="/financeiro/receber">Abrir</a>
      </div>
    </div>
  </div>
</div>

{% endblock %}
