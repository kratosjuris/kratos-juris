<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>{{ "Novo usuário" if mode == "create" else "Editar usuário" }}</title>
  <link rel="stylesheet" href="/static/css/users.css">
</head>
<body>
  <div class="page-wrap">
    <div class="panel form-panel">

      <!-- Botões de navegação -->
      <div class="nav-actions">
        <a class="btn-secondary" href="/dashboard">← Dashboard</a>
        <a class="btn-secondary" href="/usuarios">← Lista de usuários</a>
      </div>

      <h1>{{ "Novo usuário" if mode == "create" else "Editar usuário" }}</h1>

      {% if error %}
        <div class="alert-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="{{ '/usuarios/novo' if mode == 'create' else '/usuarios/' ~ user_obj.id ~ '/editar' }}">

        <label>Nome</label>
        <input type="text" name="nome" value="{{ user_obj.nome if user_obj else '' }}" required>

        <label>E-mail</label>
        <input type="email" name="email" value="{{ user_obj.email if user_obj else '' }}" required>

        <label>Username</label>
        <input type="text" name="username" value="{{ user_obj.username if user_obj else '' }}" required>

        {% if mode == "create" %}
          <label>Senha inicial</label>
          <input type="password" name="password" required>

          <label>Confirmar senha</label>
          <input type="password" name="confirm_password" required>
        {% endif %}

        <div class="checks">
          <label>
            <input type="checkbox" name="is_active"
            {% if (user_obj and user_obj.is_active) or not user_obj %}checked{% endif %}>
            Usuário ativo
          </label>

          <label>
            <input type="checkbox" name="is_superuser"
            {% if user_obj and user_obj.is_superuser %}checked{% endif %}>
            Superadministrador
          </label>

          <label>
            <input type="checkbox" name="must_change_password"
            {% if user_obj and user_obj.must_change_password %}checked{% endif %}>
            Exigir troca de senha
          </label>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Salvar</button>
          <a class="btn-secondary" href="/usuarios">Cancelar</a>
        </div>

      </form>
    </div>
  </div>
</body>
</html>
