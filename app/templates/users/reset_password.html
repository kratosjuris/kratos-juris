<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Redefinir senha</title>
  <link rel="stylesheet" href="/static/css/users.css">
</head>
<body>
  <div class="page-wrap">
    <div class="panel form-panel">
      <h1>Redefinir senha</h1>
      <p><strong>Usuário:</strong> {{ user_obj.nome }} ({{ user_obj.username }})</p>

      {% if error %}
        <div class="alert-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/usuarios/{{ user_obj.id }}/reset-senha">
        <label>Nova senha</label>
        <input type="password" name="password" required>

        <label>Confirmar nova senha</label>
        <input type="password" name="confirm_password" required>

        <div class="checks">
          <label><input type="checkbox" name="must_change_password" checked> Exigir troca de senha no próximo login</label>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Salvar nova senha</button>
          <a class="btn-secondary" href="/usuarios">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
