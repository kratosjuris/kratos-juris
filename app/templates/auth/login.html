<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kratos Juris | Login</title>
  <link rel="stylesheet" href="/static/css/login.css">

  <style>

    .login-left{
      padding:0;
      display:flex;
      align-items:center;
      justify-content:center;

      /* fundo preto */
      background:#000000;
    }

    .brand-wrap{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .brand-logo{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    /* BOTÃO OURO ESTILO KRATOS */

    .login-card button{
      width:100%;
      height:48px;
      margin-top:12px;
      border:none;
      border-radius:8px;

      font-size:16px;
      font-weight:600;
      letter-spacing:0.5px;

      color:#111;

      background:linear-gradient(
        135deg,
        #f7e27b 0%,
        #d4af37 35%,
        #c49a2c 60%,
        #f7e27b 100%
      );

      box-shadow:
        0 4px 10px rgba(212,175,55,0.35),
        inset 0 1px 0 rgba(255,255,255,0.4);

      cursor:pointer;
      transition:all .25s ease;
    }

    .login-card button:hover{
      transform:translateY(-1px);

      background:linear-gradient(
        135deg,
        #ffe58f 0%,
        #e0bc48 35%,
        #cfa33a 60%,
        #ffe58f 100%
      );

      box-shadow:
        0 6px 16px rgba(212,175,55,0.45),
        inset 0 1px 0 rgba(255,255,255,0.5);
    }

    .login-card button:active{
      transform:translateY(0);
      box-shadow:
        0 2px 6px rgba(212,175,55,0.35);
    }

  </style>

</head>
<body>

  <div class="login-shell">

    <div class="login-left">
      <div class="brand-wrap">
        <img src="/static/css/img/logo_kratos.png" alt="Kratos Juris" class="brand-logo">
      </div>
    </div>

    <div class="login-right">
      <div class="login-card">
        <h2>Acessar sistema</h2>
        <p class="subtitle">Entre com seu usuário ou e-mail</p>

        {% if error %}
          <div class="alert-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
          <input type="hidden" name="next_url" value="{{ next_url or '/dashboard' }}">

          <label>Usuário ou e-mail</label>
          <input type="text" name="login" placeholder="Digite seu usuário ou e-mail" required>

          <label>Senha</label>
          <input type="password" name="password" placeholder="Digite sua senha" required>

          <button type="submit">Entrar</button>
        </form>

        <div class="login-footer">
          <span>Kratos Juris</span>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
